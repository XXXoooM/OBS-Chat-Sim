            padding: 4px 14px;
            display: inline-flex;
            align-items: center;
            /* box-shadow: 0 4px 12px rgba(247, 89, 54, 0.2); */
            color: white;

        }

        /* 等级勋章样式 */

            background: rgba(255, 255, 255, 0.5);
            color: #ffffff;
            font-size: 0.75em;
            padding: 1px 6px; /* 使用 padding 代替固定高度，使其随字号缩放 */

            margin-right: 6px;
            font-weight: 900;
            display: flex;
            align-items: center;
        }

        /* 粉丝勋章样式 */
        .fans-badge {
            background: rgba(255, 255, 255, 0.5);

            padding: 1px 6px; /* 使用 padding 代替固定高度，使其随字号缩放 */

            margin-right: 6px;
            font-weight: normal;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        /* 设置按钮常驻半透明，悬浮时高亮 */
        #settings-trigger {
            opacity: 0.2;
            transition: all 0.3s;
        }

        #settings-trigger:hover {
            opacity: 1;
        }

        /* 现代设置面板样式 */
        .glass-panel {
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .setting-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;

        }

        .setting-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .tab-btn {
            position: relative;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #fff;
            border-radius: 1px;
        }

        function getRandomMessageData() {
            const totalWeight = MESSAGE_GROUPS.reduce((sum, group) => sum + group.weight, 0);
            let random = Math.random() * totalWeight;

            for (const group of MESSAGE_GROUPS) {
                if (random < group.weight) {
                    const phrase = group.phrases[Math.floor(Math.random() * group.phrases.length)];
                    return { type: group.type, content: phrase };
                }
                random -= group.weight;
            }
            // Fallback
            return { type: 'comment', content: '来了' };
        }

        function generateUsername() {
            const char = NAME_DATA[Math.floor(Math.random() * NAME_DATA.length)];
            const stars = '*'.repeat(1 + Math.floor(Math.random() * 4)); // 至少1个，最多4个
            return char + stars;
        }

        function generateLevel() {
            return Math.random() < 0.1 ? Math.floor(Math.random() * 30) + 1 : null;
        }

        function generateFans() {
            return Math.random() < 0.3;
        }

        function generateEmoji() {
            if (Math.random() < 0.07) {
                return EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
            }
            return null;
        }

        const ShoppingBagIcon = ({ size }) => (
            <svg

                    <svg
                        style={{ width: `${size}px`, height: `${size}px` }}
                        className="mr-0.5 fill-current"
                        viewBox="0 0 1024 1024"
                        version="1.1"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path d="M881.83 423.54C766.64 373.4 682.59 270.85 658.91 147.16 635.22 270.85 551.17 373.4 435.98 423.54c-22.41 9.76-78.22 24.77-78.22 24.77s55.8 15.01 78.22 24.77c115.19 50.14 199.24 152.69 222.93 276.38 23.68-123.69 107.74-226.24 222.92-276.38 22.41-9.76 78.22-24.77 78.22-24.77s-55.81-15.01-78.22-24.77zM406.16 683.62C337.87 653.89 288.04 593.09 274 519.76c-14.04 73.33-63.87 134.13-132.17 163.85-13.29 5.78-46.37 14.68-46.37 14.68s33.08 8.9 46.37 14.68C210.12 742.7 259.95 803.5 274 876.83c14.04-73.33 63.87-134.13 132.17-163.86 13.29-5.78 46.37-14.68 46.37-14.68s-33.09-8.89-46.38-14.67zM947.83 698.3c0 17.4-14.11 31.51-31.51 31.51s-31.51-14.11-31.51-31.51c0-17.4 14.11-31.51 31.51-31.51s31.51 14.11 31.51 31.51zM369.21 265.02c0 17.4-14.11 31.51-31.51 31.51-17.4 0-31.51-14.11-31.51-31.51 0-17.4 14.11-31.51 31.51-31.51 17.4 0.01 31.51 14.11 31.51 31.51z" fill="currentColor"></path>

            if (level >= 13 && level <= 19) {
                return (
                    <svg

                        version="1.1"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path d="M486.86255995 323.03345813l-80.42304988-191.31267706-117.67673602 170.91783402-191.31267706 80.43980818 170.91783405 117.676736 80.42304988 191.31267707 117.69349428-170.93459232 191.29591879-80.42304987zM925.47737223 350.6511256l-29.99734512-86.47279379-56.62627329 71.90983685-86.45603548 29.99734512 71.90983685 56.60951498 29.99734512 86.47279379 56.60951498-71.90983684 86.45603548-29.99734513zM712.36215549 637.33525021l-26.62892816 40.52155337-44.29216937 19.74126959 40.52155336 26.62892815 19.74126959 44.29216937 26.64568644-40.52155335 44.27541108-19.74126961-40.52155335-26.62892814z" fill="currentColor"></path>
                    </svg>
                );
            }
            if (level >= 7 && level <= 12) {
                return (
                    <svg
                        style={{ width: `${size}px`, height: `${size}px` }}
                        className="mr-0.5 fill-current"
                        viewBox="0 0 1024 1024"
                        version="1.1"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path d="M532.8 134.464c-12.16-35.392-32-35.328-44.032 0.128l-67.84 200c-12.096 35.456-50.88 74.24-86.336 86.336L136.064 488.448c-35.456 12.032-35.52 32-0.192 44.288l197.376 68.672c35.328 12.288 74.24 51.328 86.4 86.72l68.864 200.192c12.16 35.392 31.872 35.328 43.84-0.128l67.264-199.36c11.968-35.456 50.688-74.368 86.08-86.464l201.664-69.12c35.392-12.096 35.392-31.808-0.064-43.776l-198.464-67.2c-35.456-11.968-74.432-50.688-86.592-86.08L532.8 134.464z" fill="currentColor"></path>
                        <path d="M883.648 111.552c-3.456-10.112-9.152-10.112-12.608 0l-19.392 57.216a44.672 44.672 0 0 1-24.64 24.64l-56.704 19.264c-10.112 3.456-10.176 9.152 0 12.672l56.32 19.648a45.44 45.44 0 0 1 24.704 24.768l19.648 57.216c3.52 10.112 9.152 10.048 12.544-0.064l19.2-56.96a44.672 44.672 0 0 1 24.64-24.704l57.6-19.712c10.112-3.52 10.112-9.152 0-12.544l-56.704-19.2a44.8 44.8 0 0 1-24.768-24.576l-19.84-57.6z" fill="currentColor"></path>
                    </svg>
                );
            }
            return (
                <svg
                    style={{ width: `${size}px`, height: `${size}px` }}
                    className="mr-0.5 fill-current"
                    viewBox="0 0 1024 1024"
                    version="1.1"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path d="M532.792 134.472c-12.176-35.376-31.984-35.336-44.008 0.096L420.88 334.592c-12.024 35.432-50.848 74.28-86.28 86.328l-198.536 67.52c-35.424 12.048-35.496 31.968-0.16 44.272l197.344 68.704c35.336 12.304 74.208 51.312 86.384 86.696l68.872 200.208c12.168 35.384 31.92 35.32 43.88-0.136l67.24-199.336c11.952-35.456 50.704-74.384 86.104-86.504l201.648-69.064c35.4-12.12 35.36-31.848-0.088-43.832L688.832 422.32c-35.448-11.992-74.416-50.744-86.592-86.12l-69.448-201.728z" fill="currentColor"></path>
                </svg>
            );
        };

        function MessageItem({ msg, settings }) {
            const isFollow = msg.type === 'follow';
            const isOrder = msg.type === 'order';
            const isBuy = msg.type === 'buy';
            const isSpecial = isOrder || isBuy;
            const emojiChar = msg.emoji;

            return (
                <motion.div
                    layout
                    initial={{ opacity: 0, y: 5, scale: 0.95 }}
                    animate={{ opacity: 1, y: 0, scale: 1 }}
                    exit={{ opacity: 0, height: 0, scale: 0.95, margin: 0 }}
                    transition={{ 
                        opacity: { duration: 0.2 },
                        height: { duration: 0.3 },
                        layout: { type: "spring", stiffness: 500, damping: 40 }
                    }}
                    className="flex items-center mb-[2px] overflow-hidden"
                >
                    <div className="msg-bubble" style={{ fontSize: `${settings.fontSize}px` }}>
                        {msg.isFans && <span className="fans-badge">粉丝</span>}
                        {msg.level && (
                            <span className="level-badge">
                                <LevelIcon size={settings.fontSize * 0.7} level={msg.level} />
                                {msg.level}
                            </span>
                        )}
                        {emojiChar && <span className="mr-1">{emojiChar}</span>}

                        <span style={{ color: (isFollow || isSpecial) ? '#ffffff' : settings.usernameColor }} className="font-normal">
                            {msg.username}
                        </span>

                        {(!isFollow && !isSpecial) && <span className="text-[#ccc] ml-0.5 mr-1">:</span>}

                        <span className="text-white font-normal">
                            {msg.content}
                            {isBuy && <span style={{ color: '#ffb802', marginLeft: '4px' }}>1号商品</span>}
                        </span>
                    </div>
                </motion.div>
            );
        }

        function BuyingNotification({ msg, settings }) {
            return (
                <motion.div
                    layout
                    initial={{ x: -200, opacity: 0 }}
                    animate={{ x: 0, opacity: 1 }}
                    exit={{ opacity: 0 }}
                    transition={{ type: "spring", stiffness: 100, damping: 15 }}
                    className="mb-3"
                >
                    <div className="buy-bubble" style={{ fontSize: `${settings.fontSize}px` }}>
                        <ShoppingBagIcon size={settings.fontSize + 2} />
                        <span className="font-bold mr-2">{msg.username}</span>
                        <span className="opacity-90">正在去购买</span>
                    </div>
                </motion.div>
            );
        }

        function App() {
            const [showSettings, setShowSettings] = useState(false);
            const [activeTab, setActiveTab] = useState('basic'); // 'basic' | 'engine'
            const [isPlaying, setIsPlaying] = useState(true);
            const [messages, setMessages] = useState([]);
            const [buyingMsgs, setBuyingMsgs] = useState([]);
            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem(SETTINGS_KEY);
                return saved ? { ...DEFAULT_SETTINGS, ...JSON.parse(saved) } : DEFAULT_SETTINGS;
            });

            const scrollRef = useRef(null);

            useEffect(() => {
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            }, [settings]);

            useEffect(() => {
                if (!isPlaying) return;

                let timer;

                const createMessage = () => {
                    const data = getRandomMessageData();
                    const newMessage = {
                        ...data,
                        username: generateUsername(),
                        level: generateLevel(),
                        isFans: generateFans(),
                        emoji: generateEmoji(),
                        timestamp: Date.now(),
                        id: Math.random().toString(36).substr(2, 9)
                    };
                    setMessages(prev => [...prev, newMessage].slice(-settings.maxMessages));

                    // 随机触发“正在购买”
                    if (settings.showBuying && Math.random() < settings.buyingProb) {
                        const buyMsg = {
                            username: generateUsername(),
                            id: Date.now() + Math.random()
                        };
                        setBuyingMsgs(prev => [...prev, buyMsg]);
                        // 3.5秒后自动从浮层消失
                        setTimeout(() => {
                            setBuyingMsgs(prev => prev.filter(m => m.id !== buyMsg.id));
                        }, 3500);
                    }
                };

                if (settings.freqMode === 'random') {
                    const startNewWave = () => {
                        const count = Math.floor(Math.random() * (settings.randomCountMax - settings.randomCountMin + 1)) + settings.randomCountMin;
                        const windowMs = (Math.floor(Math.random() * (settings.randomWindowMax - settings.randomWindowMin + 1)) + settings.randomWindowMin) * 1000;
                        const interval = windowMs / count;

                        let messagesSent = 0;
                        const sendNext = () => {
                            if (messagesSent < count) {
                                createMessage();
                                messagesSent++;
                                // 增加一点随机抖动让间距更自然
                                const jitter = (Math.random() * 0.4 + 0.8); // 0.8 - 1.2
                                timer = setTimeout(sendNext, interval * jitter);
                            } else {
                                startNewWave();
                            }
                        };
                        sendNext();
                    };
                    startNewWave();
                } else {
                    timer = setInterval(createMessage, settings.messageSpeed);
                }

                return () => {
                    if (settings.freqMode === 'random') clearTimeout(timer);
                    else clearInterval(timer);
                };
            }, [isPlaying, settings.freqMode, settings.messageSpeed, settings.maxMessages, settings.randomCountMin, settings.randomCountMax, settings.randomWindowMin, settings.randomWindowMax]);

            useEffect(() => {
                if (settings.messageLifetime === 0) return;
                const interval = setInterval(() => {
                    const now = Date.now();
                    setMessages(prev => prev.filter(m => (now - m.timestamp) < settings.messageLifetime * 1000));
                }, 1000);
                return () => clearInterval(interval);
            }, [settings.messageLifetime]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages]);

            return (
                <div
                    className="min-h-screen w-full flex flex-col justify-end p-4 transition-colors duration-1000 overflow-hidden"
                    style={{ backgroundColor: settings.bgColor === 'transparent' ? 'transparent' : settings.bgColor }}
                    onDoubleClick={() => setShowSettings(true)}
                >

                    {/* 极其隐蔽的设置触发区 */}
                    <div id="settings-trigger" className="fixed top-0 right-0 p-4 z-50">
                        <button onClick={() => setShowSettings(true)} className="bg-black/40 px-3 py-1 rounded-full text-white text-[10px] font-bold tracking-tighter">
                            系统设置 (CONFIG)
                        </button>
                    </div>

                    <div style={{ width: `${settings.containerWidth}px` }} className="flex flex-col items-start">
                        {/* 正在购买 独立区域 */}
                        <div className="w-full">
                            <AnimatePresence>
                                {buyingMsgs.map(msg => (
                                    <BuyingNotification key={msg.id} msg={msg} settings={settings} />
                                ))}
                            </AnimatePresence>
                        </div>

                        {/* 弹幕滚动区域 */}
                        <div
                            ref={scrollRef}
                            className="flex flex-col items-start overflow-y-auto scrollbar-none transition-all duration-300"
                            style={{
                                width: '100%',
                                maxHeight: '80vh',
                                maskImage: `linear-gradient(to top, black ${100 - settings.maskHeight}%, transparent 100%)`,
                                WebkitMaskImage: `linear-gradient(to top, black ${100 - settings.maskHeight}%, transparent 100%)`
                            }}
                        >
                            <AnimatePresence initial={false}>
                                {messages.map(msg => (
                                    <MessageItem key={msg.id} msg={msg} settings={settings} />
                                ))}
                            </AnimatePresence>
                        </div>
                    </div>

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="glass-panel rounded-[32px] w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                                {/* 头部 */}
                                <div className="px-8 pt-8 pb-4 flex justify-between items-center bg-white/5">
                                    <div>
                                        <h2 className="text-white font-black text-2xl italic uppercase tracking-tighter flex items-center gap-2">
                                            <span className="w-8 h-8 bg-white text-black rounded-lg flex items-center justify-center not-italic">S</span>
                                            设置面板
                                        </h2>
                                        <p className="text-white/40 text-[10px] font-bold uppercase tracking-widest mt-1">专业直播叠加层 Pro v4.0</p>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="w-10 h-10 rounded-full bg-white/10 text-white hover:bg-white/20 transition-all flex items-center justify-center text-xl">×</button>
                                </div>

                                {/* Tab 切换 */}
                                <div className="px-8 flex gap-4 border-b border-white/10 bg-white/5">
                                    <button onClick={() => setActiveTab('basic')} className={`tab-btn ${activeTab === 'basic' ? 'active' : ''}`}>基础视觉</button>
                                    <button onClick={() => setActiveTab('engine')} className={`tab-btn ${activeTab === 'engine' ? 'active' : ''}`}>模拟引擎</button>
                                </div>

                                {/* 内容区 */}
                                <div className="p-8 overflow-y-auto scrollbar-none flex-1 space-y-6">
                                    {activeTab === 'basic' ? (
                                        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
                                            {/* 背景设置 */}
                                            <div className="setting-card">
                                                <div className="flex justify-between items-center mb-4">
                                                    <span className="text-white/60 text-[11px] font-bold uppercase">画布背景</span>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setSettings({ ...settings, bgColor: '#00ff00' })} className="text-[9px] bg-green-500/20 px-2 py-1 rounded-md text-green-400 border border-green-500/20 hover:bg-green-500/30">绿幕模式</button>
                                                        <button onClick={() => setSettings({ ...settings, bgColor: 'transparent' })} className="text-[9px] bg-blue-500/20 px-2 py-1 rounded-md text-blue-400 border border-blue-500/20 hover:bg-blue-500/30">透明模式</button>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="relative group flex-1">
                                                        <input type="color" value={settings.bgColor === 'transparent' ? '#00ff00' : settings.bgColor} onChange={e => setSettings({ ...settings, bgColor: e.target.value })} className="w-full h-12 rounded-xl cursor-pointer bg-transparent border-none" />
                                                        <div className="absolute inset-0 pointer-events-none rounded-xl border-2 border-white/10 group-hover:border-white/30 transition-colors"></div>
                                                    </div>
                                                    {settings.bgColor === 'transparent' && <span className="text-[10px] font-bold text-blue-400 border border-blue-500/30 px-2 py-1 rounded-lg bg-blue-500/10 uppercase tracking-tighter">原生透明通道已开启</span>}
                                                </div>
                                            </div>

                                            {/* 字体与颜色 */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="setting-card">
                                                    <div className="flex justify-between mb-3">
                                                        <span className="text-white/60 text-[11px] font-bold uppercase">字体大小</span>
                                                        <span className="text-white text-[11px] font-mono">{settings.fontSize}px</span>
                                                    </div>
                                                    <input type="range" min="12" max="24" value={settings.fontSize} onChange={e => setSettings({ ...settings, fontSize: parseInt(e.target.value) })} className="w-full" />
                                                </div>
                                                <div className="setting-card">
                                                    <span className="text-white/60 text-[11px] font-bold uppercase block mb-3">用户名颜色</span>
                                                    <div className="flex items-center gap-3">
                                                        <input type="color" value={settings.usernameColor} onChange={e => setSettings({ ...settings, usernameColor: e.target.value })} className="w-full h-8 rounded-lg cursor-pointer bg-transparent border-none" />
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 布局 */}
                                            <div className="setting-card space-y-4">
                                                <div className="flex justify-between">
                                                    <span className="text-white/60 text-[11px] font-bold uppercase">显示区域宽度</span>
                                                    <span className="text-white text-[11px] font-mono">{settings.containerWidth}px</span>
                                                </div>
                                                <input type="range" min="200" max="800" value={settings.containerWidth} onChange={e => setSettings({ ...settings, containerWidth: parseInt(e.target.value) })} className="w-full" />
                                                
                                                <div className="flex justify-between pt-2">
                                                    <span className="text-white/60 text-[11px] font-bold uppercase">顶部渐隐深度</span>
                                                    <span className="text-white text-[11px] font-mono">{settings.maskHeight}%</span>
                                                </div>
                                                <input type="range" min="0" max="50" value={settings.maskHeight} onChange={e => setSettings({ ...settings, maskHeight: parseInt(e.target.value) })} className="w-full" />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
                                            {/* 核心频率 */}
                                            <div className="setting-card space-y-4">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-white/60 text-[11px] font-bold uppercase">频率触发逻辑</span>
                                                    <button
                                                        onClick={() => setSettings({ ...settings, freqMode: settings.freqMode === 'fixed' ? 'random' : 'fixed' })}
                                                        className={`px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase transition-all ${settings.freqMode === 'random' ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50' : 'bg-white/10 text-white/50'}`}
                                                    >
                                                        {settings.freqMode === 'random' ? '随机波动' : '固定频率'}
                                                    </button>
                                                </div>

                                                {settings.freqMode === 'fixed' ? (
                                                    <div className="space-y-3">
                                                        <div className="flex justify-between">
                                                            <span className="text-white/40 text-[10px] font-bold">发送间隔 (MS)</span>
                                                            <span className="text-white text-[10px] font-mono">{settings.messageSpeed}ms</span>
                                                        </div>
                                                        <input type="range" min="300" max="3000" step="100" value={settings.messageSpeed} onChange={e => setSettings({ ...settings, messageSpeed: parseInt(e.target.value) })} className="w-full" />
                                                    </div>
                                                ) : (
                                                    <div className="grid grid-cols-1 gap-6">
                                                        <div className="space-y-3">
                                                            <div className="flex justify-between">
                                                                <span className="text-white/40 text-[10px] font-bold uppercase">波动周期范围 (秒)</span>
                                                                <span className="text-white text-[10px] font-mono">{settings.randomWindowMin} - {settings.randomWindowMax}s</span>
                                                            </div>
                                                            <div className="flex gap-4">
                                                                <input type="range" min="10" max="60" value={settings.randomWindowMin} onChange={e => setSettings({ ...settings, randomWindowMin: parseInt(e.target.value) })} className="flex-1" />
                                                                <input type="range" min="60" max="300" value={settings.randomWindowMax} onChange={e => setSettings({ ...settings, randomWindowMax: parseInt(e.target.value) })} className="flex-1" />
                                                            </div>
                                                        </div>
                                                        <div className="space-y-3">
                                                            <div className="flex justify-between">
                                                                <span className="text-white/40 text-[10px] font-bold uppercase">单周期消息密度</span>
                                                                <span className="text-white text-[10px] font-mono">{settings.randomCountMin} - {settings.randomCountMax}</span>
                                                            </div>
                                                            <div className="flex gap-4">
                                                                <input type="range" min="1" max="20" value={settings.randomCountMin} onChange={e => setSettings({ ...settings, randomCountMin: parseInt(e.target.value) })} className="flex-1" />
                                                                <input type="range" min="20" max="100" value={settings.randomCountMax} onChange={e => setSettings({ ...settings, randomCountMax: parseInt(e.target.value) })} className="flex-1" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>

                                            {/* 生命周期与缓存 */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="setting-card">
                                                    <div className="flex justify-between mb-3">
                                                        <span className="text-white/60 text-[11px] font-bold uppercase">最大消息数</span>
                                                        <span className="text-white text-[11px] font-mono">{settings.maxMessages}</span>
                                                    </div>
                                                    <input type="range" min="5" max="100" value={settings.maxMessages} onChange={e => setSettings({ ...settings, maxMessages: parseInt(e.target.value) })} className="w-full" />
                                                </div>
                                                <div className="setting-card">
                                                    <div className="flex justify-between mb-3">
                                                        <span className="text-white/60 text-[11px] font-bold uppercase">自动销毁 (秒)</span>
                                                        <span className="text-white text-[11px] font-mono">{settings.messageLifetime}s</span>
                                                    </div>
                                                    <input type="range" min="5" max="60" value={settings.messageLifetime} onChange={e => setSettings({ ...settings, messageLifetime: parseInt(e.target.value) })} className="w-full" />
                                                </div>
                                            </div>

                                            {/* 购买功能 */}
                                            <div className="setting-card bg-orange-600/10 border-orange-500/20">
                                                <div className="flex justify-between items-center mb-4">
                                                    <span className="text-orange-400 text-[11px] font-bold uppercase tracking-widest">正在购买通知</span>
                                                    <button
                                                        onClick={() => setSettings({ ...settings, showBuying: !settings.showBuying })}
                                                        className={`w-12 h-6 rounded-full transition-all relative ${settings.showBuying ? 'bg-orange-600' : 'bg-white/10'}`}
                                                    >
                                                        <div className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-all ${settings.showBuying ? 'right-1' : 'left-1'}`}></div>
                                                    </button>
                                                </div>
                                                <div className="space-y-3">
                                                    <div className="flex justify-between">
                                                        <span className="text-white/30 text-[10px] font-bold uppercase">触发概率</span>
                                                        <span className="text-orange-300 text-[10px] font-bold">{Math.round(settings.buyingProb * 100)}%</span>
                                                    </div>
                                                    <input type="range" min="0" max="1" step="0.05" value={settings.buyingProb} onChange={e => setSettings({ ...settings, buyingProb: parseFloat(e.target.value) })} className="w-full accent-orange-500" />
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* 底部操作 */}
                                <div className="p-8 pt-4 bg-white/5 flex gap-4 border-t border-white/10">
                                    <button 
                                        onClick={() => {
                                            if(confirm('确定要恢复默认设置吗？')) setSettings(DEFAULT_SETTINGS);
                                        }} 
                                        className="flex-1 py-4 rounded-2xl bg-white/5 text-white/40 text-[10px] font-black uppercase tracking-widest hover:bg-white/10 hover:text-white transition-all border border-white/5"
                                    >
                                        恢复默认设置
                                    </button>
                                    <button 
                                        onClick={() => setIsPlaying(!isPlaying)} 
                                        className={`flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-white transition-all shadow-2xl ${isPlaying ? 'bg-red-500/80 shadow-red-900/20 hover:bg-red-500' : 'bg-green-600/80 shadow-green-900/20 hover:bg-green-600'}`}
                                    >
                                        {isPlaying ? '停止模拟' : '开启模拟'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
